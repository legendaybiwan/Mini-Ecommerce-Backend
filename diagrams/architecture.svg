<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="680" height="380" fill="#ffffff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="20" y="160" width="110" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="75" y="182" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Client</text>
  <text x="75" y="200" text-anchor="middle" font-size="12" fill="#5F5E5A">POST /orders</text>
  <line x1="130" y1="188" x2="168" y2="188" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Flask API -->
  <rect x="170" y="160" width="150" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="245" y="182" text-anchor="middle" font-size="14" font-weight="600" fill="#0C447C">Flask API</text>
  <text x="245" y="200" text-anchor="middle" font-size="12" fill="#185FA5">place_order()</text>
  <line x1="320" y1="188" x2="368" y2="188" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BEGIN IMMEDIATE box -->
  <rect x="370" y="60" width="290" height="260" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <text x="515" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#712B13">SQLite transaction</text>
  <text x="515" y="104" text-anchor="middle" font-size="12" fill="#993C1D">BEGIN IMMEDIATE</text>

  <rect x="392" y="120" width="246" height="48" rx="8" fill="#FFFFFF" stroke="#D85A30" stroke-width="1"/>
  <text x="515" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">UPDATE products</text>
  <text x="515" y="155" text-anchor="middle" font-size="11" fill="#993C1D">SET stock = stock - qty</text>

  <line x1="515" y1="168" x2="515" y2="186" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="392" y="188" width="246" height="48" rx="8" fill="#FFFFFF" stroke="#D85A30" stroke-width="1"/>
  <text x="515" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">WHERE stock &gt;= qty</text>
  <text x="515" y="223" text-anchor="middle" font-size="11" fill="#993C1D">check + write, one step</text>

  <line x1="515" y1="236" x2="515" y2="254" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="392" y="256" width="246" height="44" rx="8" fill="#FFFFFF" stroke="#D85A30" stroke-width="1"/>
  <text x="515" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">COMMIT or ROLLBACK</text>

  <text x="515" y="350" text-anchor="middle" font-size="12" fill="#5F5E5A">
    No other writer can run its own UPDATE on this row until this transaction ends
  </text>
</svg>
